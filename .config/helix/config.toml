# Based on the helix branch from https://github.com/gj1118/helix, which integrates in
# a bunch of changes
theme = "monokai_pro_spectrum"

[editor]
line-number = "relative"
mouse = true
cursorline = true
true-color = true
rulers = [80, 120]
color-modes = true
completion-timeout = 15
# bufferline = "multiple"
jump-label-alphabet = "jfkdls;aurieowpqnvmcxz"
default-yank-register = '+'
fold-textobjects = ["comment"] # Example: fold all comments on open
end-of-line-diagnostics="error"

[editor.inline-diagnostics]
cursor-line = "disable"
other-lines = "disable"
max-diagnostics = 2

[editor.cmdline]
# Command line style: "bottom" (default) or "popup" (noice.nvim style)
style = "popup"
min-popup-width = 80
show-icons = false

[editor.notifications]
enable = true              # Enable notification system
style = "popup"            # "popup" (noice-style) or "statusline" (traditional)
position = "top-right"     # Position: "top-right", "top-left", "bottom-right", "bottom-left"
max-width = 60             # Maximum width for notification popups
max-height = 10            # Maximum height for notification popups
default-timeout = 2000     # Default timeout in milliseconds (0 = no timeout)
show-icons = true          # Show notification type icons
# show-emojis = true         # Show notification type emojis
max-history = 100          # Maximum notifications to keep in history

[editor.statusline]
left = ["mode", "spinner", "file-name", "function-name"]
right = ["diagnostics", "separator", "workspace-diagnostics", "selections", "position"]
separator = "│"
mode.normal = "NOR"
mode.insert = "INS"
mode.select = "SEL"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[editor.soft-wrap]
enable = true

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'

# Of course, you could have it reload on focus and at an interval too:
[editor.auto-reload]
focus-gained = true
periodic.enable = true
periodic.interval = 500

[editor.lsp]
# Disable automatically popups of signature parameter help
auto-signature-help = false
# Show LSP messages in the status line
display-messages = true
display-inlay-hints = true
display-progress-messages = true

[editor.smart-tab]
supersede-menu = true
#####################################
# Keys
[keys.insert]
"C-[" = "normal_mode"
C-h = "signature_help"

[keys.normal]
- = "@zt k"
# "C-p" = "@:lsp-workspace-command "
"C-p" = "@:sh "
"C-r" = "@:rl"
"ret" = "goto_word"
C-j     = "page_down"
C-k     = ["page_up", "goto_window_top"]
"]" = {f = ["goto_next_function", "flip_selections", "collapse_selection"], F=["goto_next_function", "flip_selections"]}
"[" = {f = ["goto_prev_function", "collapse_selection"], F=["goto_prev_function", "flip_selections"]}

C-y = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi %{buffer_name} --chooser-file=/tmp/unique-file',
  ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]
C-g = [
    ":write-all",
    ":new",
    ":insert-output lazygit",
    ":buffer-close!",
    ":redraw",
    ":reload-all"
]

[keys.normal.g]
a = "code_action" # Maps `ga` to show possible code actions

[keys.normal.backspace]
y = ":yank-diagnostic"
backspace = "suspend"

[keys.normal."space".b]
f = "buffer_picker"
q = ":buffer-close"
p = ":buffer-previous"
n = ":buffer-next"

[keys.select]
"g" = { "e" = "extend_to_file_end" }
"]" = {f = ["goto_next_function", "flip_selections", "collapse_selection"], F=["goto_next_function", "flip_selections"]}
"[" = {f = ["goto_prev_function", "collapse_selection"], F=["goto_prev_function", "flip_selections"]}
